[mcp_servers]
# TOML uses dotted tables for nesting. The parent table is here only to make the
# section grouping explicit; each server still gets its own [mcp_servers.<name>]
# table below.

# GitHub MCP and approval overrides. Keep these together so review diffs do not
# make tool approvals look removed when they are only reordered.
[mcp_servers.github]
url = "https://dbt.runlayer.com/api/v1/proxy/7e8a07e2-98ed-4c76-8edb-d8a68b55bccc/mcp"

[mcp_servers.github.tools.add_comment_to_pending_review]
