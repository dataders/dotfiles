# tmux configuration - beginner friendly

# Enable mouse support (click panes, scroll with trackpad)
set -g mouse on

# Easier split keybindings (| for side-by-side, - for top/bottom)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Start window and pane numbering at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Faster key repetition
set -s escape-time 0

# Reload config with Ctrl+b r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
