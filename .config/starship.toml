# Starship prompt configuration
# https://starship.rs/config/

# General settings
add_newline = false
command_timeout = 1000

# Prompt format (left side)
format = """
${custom.dir}\
$git_branch\
$git_status\
$python\
$aws\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[git_branch]
format = "[$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"

[python]
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

[aws]
format = '[$symbol($profile )(\($region\) )]($style)'
symbol = " "
style = "bold orange"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "bold yellow"

[custom.dir]
command = "~/Developer/dotfiles/bin/dir-badge"
when = true
format = "$output "
